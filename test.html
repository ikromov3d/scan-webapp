<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  body { background: #111; color: #fff; font-family: sans-serif; padding: 20px; }
  button { background: #4f8ef7; color: #fff; border: none; border-radius: 8px; padding: 14px 24px; font-size: 16px; margin: 10px 0; width: 100%; cursor: pointer; }
  #log { background: #222; border-radius: 8px; padding: 12px; margin-top: 20px; font-size: 13px; min-height: 100px; }
</style>
</head>
<body>

<h2>🧪 Web App Test</h2>

<button onclick="testSendData()">📤 sendData test</button>
<button onclick="testClose()">❌ close test</button>

<div id="log">Log...<br></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

function log(msg) {
  document.getElementById('log').innerHTML += msg + '<br>';
}

log('✅ tg yuklanadi');
log('version: ' + tg.version);
log('platform: ' + tg.platform);
log('initData: ' + (tg.initData ? 'bor' : 'yoq'));

function testSendData() {
  log('📤 sendData chaqirilmoqda...');
  try {
    tg.sendData(JSON.stringify({test: "hello", time: Date.now()}));
    log('✅ sendData chaqirildi');
  } catch(e) {
    log('❌ XATO: ' + e.message);
  }
}

function testClose() {
  log('❌ close chaqirilmoqda...');
  tg.close();
}
</script>
</body>
</html>
