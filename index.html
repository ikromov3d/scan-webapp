<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kromka belgilash</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f1117;
    --card:     #1a1d27;
    --border:   #2a2d3a;
    --accent:   #4f8ef7;
    --accent2:  #f74f7a;
    --text:     #e8eaf0;
    --sub:      #7b7f8e;
    --checked:  #4f8ef7;
    --radius:   12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Pro Display', -apple-system, sans-serif;
    min-height: 100vh;
    padding-bottom: 90px;
  }

  /* ── HEADER ── */
  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .header p {
    font-size: 12px;
    color: var(--sub);
    margin-top: 2px;
  }

  /* ── KROMKA TYPES ── */
  .types-section {
    padding: 14px 16px 0;
  }
  .types-section h2 {
    font-size: 11px;
    font-weight: 600;
    color: var(--sub);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
  }
  .type-row {
    display: flex;
    gap: 10px;
    margin-bottom: 8px;
    align-items: center;
  }
  .type-label {
    font-size: 13px;
    color: var(--sub);
    width: 36px;
    flex-shrink: 0;
  }
  .type-input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .type-input:focus {
    border-color: var(--accent);
  }
  .type-input::placeholder { color: var(--sub); }

  /* ── DETAILS LIST ── */
  .list-section {
    padding: 14px 16px 0;
  }
  .list-section h2 {
    font-size: 11px;
    font-weight: 600;
    color: var(--sub);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
  }

  .detail-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .detail-card.has-kromka {
    border-color: var(--accent);
  }

  .detail-top {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    gap: 10px;
  }
  .detail-num {
    font-size: 12px;
    color: var(--sub);
    width: 22px;
    flex-shrink: 0;
  }
  .detail-dim {
    font-size: 15px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    flex: 1;
  }
  .detail-dim span {
    color: var(--sub);
    font-weight: 400;
  }
  .kromka-badge {
    font-size: 11px;
    background: var(--accent);
    color: #fff;
    border-radius: 6px;
    padding: 2px 7px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .detail-card.has-kromka .kromka-badge { opacity: 1; }

  /* ── CHECKBOX GRID ── */
  .kromka-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-top: 1px solid var(--border);
  }
  .krom-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--card);
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .krom-btn:active { background: #222535; }

  .krom-icon {
    width: 36px;
    height: 20px;
    position: relative;
    flex-shrink: 0;
  }
  /* SVG panel diagram */
  .krom-icon svg {
    width: 100%;
    height: 100%;
  }

  .krom-info { flex: 1; min-width: 0; }
  .krom-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
  }
  .krom-type-label {
    font-size: 10px;
    color: var(--sub);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .krom-check {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    border: 2px solid var(--border);
    background: transparent;
    flex-shrink: 0;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .krom-btn.selected .krom-check {
    background: var(--accent);
    border-color: var(--accent);
  }
  .krom-btn.selected .krom-check::after {
    content: '';
    width: 5px;
    height: 9px;
    border: 2px solid #fff;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translateY(-1px);
  }
  .krom-btn.t2.selected .krom-check {
    background: var(--accent2);
    border-color: var(--accent2);
  }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--card);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
  }
  .submit-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    padding: 14px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: -0.2px;
  }
  .submit-btn:active { opacity: 0.85; transform: scale(0.99); }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--sub);
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🎨 Kromka belgilash</h1>
  <p>Har bir detal uchun kromka tomonini tanlang</p>
</div>

<div class="types-section">
  <h2>Kromka turlari</h2>
  <div class="type-row">
    <span class="type-label" style="color:#4f8ef7">Tip 1</span>
    <input class="type-input" id="tip1" placeholder="masalan: 1 o'zidan" />
  </div>
  <div class="type-row">
    <span class="type-label" style="color:#f74f7a">Tip 2</span>
    <input class="type-input" id="tip2" placeholder="masalan: 0.4 o'zidan" />
  </div>
</div>

<div class="list-section">
  <h2>Detallar</h2>
  <div id="list"></div>
</div>

<div class="bottom-bar">
  <button class="submit-btn" onclick="submit()">✅ Tasdiqlash</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// ── Ma'lumot olish ──
let details = [];
try {
  const raw = tg.initDataUnsafe?.start_param || '';
  if (raw) details = JSON.parse(decodeURIComponent(atob(raw)));
} catch(e) {}

// Test uchun (GitHub Pages da ochilganda)
if (!details.length) {
  details = [
    {uzun:250, keng:60, son:6},
    {uzun:868, keng:60, son:6},
    {uzun:868, keng:50, son:2},
    {uzun:868, keng:10, son:6},
    {uzun:236, keng:60, son:1},
    {uzun:425, keng:50, son:8},
  ];
}

// Holat: har detal uchun {uzun1, uzun2, keng1, keng2} — null | 't1' | 't2'
const state = details.map(() => ({uzun1:null, uzun2:null, keng1:null, keng2:null}));

// Tomonlar konfiguratsiyasi
const SIDES = [
  { key:'keng1', name:'Yuqori',  pos:'top'    },
  { key:'keng2', name:'Pastki',  pos:'bottom' },
  { key:'uzun1', name:'Chap',    pos:'left'   },
  { key:'uzun2', name:'O\'ng',   pos:'right'  },
];

function panelSVG(pos, active, type) {
  const color = active ? (type==='t2' ? '#f74f7a' : '#4f8ef7') : '#2a2d3a';
  const rects = {
    top:    `<rect x="2" y="0" width="32" height="4" rx="1" fill="${active&&pos==='top'?color:'#2a2d3a'}"/>`,
    bottom: `<rect x="2" y="16" width="32" height="4" rx="1" fill="${active&&pos==='bottom'?color:'#2a2d3a'}"/>`,
    left:   `<rect x="0" y="4" width="4" height="12" rx="1" fill="${active&&pos==='left'?color:'#2a2d3a'}"/>`,
    right:  `<rect x="32" y="4" width="4" height="12" rx="1" fill="${active&&pos==='right'?color:'#2a2d3a'}"/>`,
  };
  return `<svg viewBox="0 0 36 20" xmlns="http://www.w3.org/2000/svg">
    <rect x="4" y="4" width="28" height="12" rx="2" fill="#1a1d27" stroke="#3a3d4a" stroke-width="1"/>
    ${rects.top}${rects.bottom}${rects.left}${rects.right}
  </svg>`;
}

function render() {
  const list = document.getElementById('list');
  if (!details.length) {
    list.innerHTML = '<div class="empty-state">Detallar topilmadi</div>';
    return;
  }

  list.innerHTML = details.map((d, i) => {
    const s = state[i];
    const hasAny = Object.values(s).some(v => v !== null);

    const btns = SIDES.map(side => {
      const val  = s[side.key];
      const isSel = val !== null;
      const isT2  = val === 't2';
      const cls   = `krom-btn${isSel?' selected':''}${isT2?' t2':''}`;
      return `<div class="${cls}" onclick="toggle(${i},'${side.key}',this)">
        <div class="krom-icon">${panelSVG(side.pos, isSel, val)}</div>
        <div class="krom-info">
          <div class="krom-name">${side.name}</div>
          <div class="krom-type-label">${isSel ? (isT2?'Tip 2':'Tip 1') : '—'}</div>
        </div>
        <div class="krom-check"></div>
      </div>`;
    }).join('');

    return `<div class="detail-card${hasAny?' has-kromka':''}" id="card-${i}">
      <div class="detail-top">
        <span class="detail-num">${i+1}.</span>
        <span class="detail-dim">${d.uzun}<span>×</span>${d.keng}<span>×</span>${d.son}</span>
        <span class="kromka-badge">K</span>
      </div>
      <div class="kromka-grid" id="grid-${i}">${btns}</div>
    </div>`;
  }).join('');
}

function toggle(i, key, btn) {
  const cur = state[i][key];
  // null → t1 → t2 → null
  if (cur === null)      state[i][key] = 't1';
  else if (cur === 't1') state[i][key] = 't2';
  else                   state[i][key] = null;
  render();
}

function submit() {
  const tip1 = document.getElementById('tip1').value.trim();
  const tip2 = document.getElementById('tip2').value.trim();

  const result = details.map((d, i) => {
    const s = state[i];
    return {
      uzun: d.uzun, keng: d.keng, son: d.son,
      uzun1: s.uzun1 ? (s.uzun1==='t1' ? tip1 : tip2) : '',
      uzun2: s.uzun2 ? (s.uzun2==='t1' ? tip1 : tip2) : '',
      keng1: s.keng1 ? (s.keng1==='t1' ? tip1 : tip2) : '',
      keng2: s.keng2 ? (s.keng2==='t1' ? tip1 : tip2) : '',
    };
  });

  tg.sendData(JSON.stringify({tip1, tip2, details: result}));
  tg.close();
}

render();
</script>
</body>
</html>
